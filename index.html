<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html, body{
  overflow-x:hidden;
  background:#000;
  color:#fff;
  font-family:'Orbitron',sans-serif;
}

/* ===== VHS EFFECT ===== */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 2px
  );
  pointer-events:none;
  z-index:999;
  animation:flicker 0.15s infinite;
}

@keyframes flicker{
  0%{opacity:.05}
  50%{opacity:.1}
  100%{opacity:.05}
}

/* ===== NOISE ===== */
body::after{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.1;
  pointer-events:none;
  z-index:998;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* GLITCH TEXT */
h1{
  font-size:5rem;
  letter-spacing:10px;
  position:relative;
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{transform:translate(0)}
  20%{transform:translate(-2px,2px)}
  40%{transform:translate(-2px,-2px)}
  60%{transform:translate(2px,2px)}
  80%{transform:translate(2px,-2px)}
  100%{transform:translate(0)}
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:0.2s;
}

.btn:hover{
  background:#fff;
  color:#000;
  transform:scale(1.1);
}

/* SECTION */
.section{
  padding:120px 20px;
  text-align:center;
}

h2{
  margin-bottom:30px;
}

/* MERCH */
.merch{
  max-width:400px;
  margin:0 auto;
}

/* IMAGE GLITCH HARD */
.merch img{
  width:100%;
  transition:0.2s;
}

.merch img:hover{
  animation:glitchImg 0.15s infinite;
  filter:contrast(2) brightness(1.5);
}

@keyframes glitchImg{
  0%{transform:translate(0)}
  25%{transform:translate(5px,-3px)}
  50%{transform:translate(-5px,3px)}
  75%{transform:translate(3px,2px)}
  100%{transform:translate(0)}
}

/* BUTTON GLITCH */
.merch-btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
}

.merch-btn:hover{
  animation:glitch 0.2s infinite;
  background:#fff;
  color:#000;
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  color:#fff;
  text-decoration:none;
}

.socials a:hover{
  background:#fff;
  color:#000;
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  opacity:.4;
}
</style>
</head>

<body>

<section class="hero">
  <h1>PAPA GABBA</h1>

  <a href="https://open.spotify.com/track/7IzqmNEau3loDdGiLRpwcx" target="_blank" class="btn">
    LISTEN
  </a>
</section>

<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Raw energy. Dark aesthetics. Papa Gabba is a project built on underground sound and visual chaos.
  </p>
</section>

<section class="section">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">

    <p style="margin-top:10px;">PAPA GABBA T-SHIRT</p>
    <p style="opacity:.6;font-size:12px;">LIMITED DROP</p>

    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">
      BUY
    </a>
  </div>
</section>

<section class="section">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/track/7IzqmNEau3loDdGiLRpwcx" target="_blank">Spotify</a>
  </div>
</section>

<footer>
  © 2026 PAPA GABBA
</footer>

</body>
</html>
