<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html, body{
  overflow-x:hidden;
  overflow-y:auto;
  background:#000;
  color:#fff;
  font-family:'Orbitron',sans-serif;
}

/* GLITCH BACKGROUND */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.08;
  pointer-events:none;
  z-index:0;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  z-index:1;
}

h1{
  font-size:5rem;
  letter-spacing:10px;
  animation:glitchText 2s infinite;
}

@keyframes glitchText{
  0%{text-shadow:2px 0 red,-2px 0 blue;}
  50%{text-shadow:-2px 0 red,2px 0 blue;}
  100%{text-shadow:2px 0 red,-2px 0 blue;}
}

.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:0.2s;
}

.btn:hover{
  background:#fff;
  color:#000;
  transform:scale(1.05);
}

/* SECTION */
.section{
  padding:100px 20px;
  text-align:center;
  position:relative;
  z-index:1;
}

h2{
  margin-bottom:30px;
  letter-spacing:4px;
}

/* MERCH */
.merch{
  max-width:400px;
  margin:0 auto;
}

.merch img{
  width:100%;
  border:1px solid rgba(255,255,255,0.2);
  transition:0.3s;
}

/* HORROR IMAGE EFFECT */
.merch img:hover{
  animation:glitchImg 0.2s infinite;
  filter:contrast(1.6) brightness(1.3);
}

@keyframes glitchImg{
  0%{transform:translate(0)}
  25%{transform:translate(3px,-2px)}
  50%{transform:translate(-3px,2px)}
  75%{transform:translate(2px,1px)}
  100%{transform:translate(0)}
}

/* BUTTON */
.merch-btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:0.2s;
}

.merch-btn:hover{
  animation:glitchText 0.3s infinite;
  background:#fff;
  color:#000;
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
  transition:0.2s;
}

.socials a:hover{
  background:#fff;
  color:#000;
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  opacity:.5;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>PAPA GABBA</h1>

  <a href="https://open.spotify.com/track/7IzqmNEau3loDdGiLRpwcx" target="_blank" class="btn">
    LISTEN
  </a>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Raw energy. Dark aesthetics. Papa Gabba is a project built on underground sound and visual chaos.
  </p>
</section>

<!-- MERCH -->
<section class="section">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">

    <p style="margin-top:10px;">PAPA GABBA T-SHIRT</p>
    <p style="opacity:.6;font-size:12px;">LIMITED DROP</p>

    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">
      BUY
    </a>
  </div>

</section>

<!-- SOCIAL -->
<section class="section">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/track/7IzqmNEau3loDdGiLRpwcx" target="_blank">Spotify</a>
  </div>
</section>

<footer>
  © 2026 PAPA GABBA
</footer>

</body>
</html>
