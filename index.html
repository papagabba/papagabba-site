<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  color:#fff;
  font-family:'Orbitron',sans-serif;
  overflow-x:hidden;
}

/* 📼 VHS NOISE */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.07;
  pointer-events:none;
  z-index:999;
}

/* ⚡ SCREEN FLICKER */
body{
  animation:flicker 3s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1;}
  50%{opacity:0.98;}
  52%{opacity:1;}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* 💀 GLITCH TITLE */
h1{
  font-size:5rem;
  letter-spacing:10px;
  position:relative;
}

h1::before,
h1::after{
  content:"PAPA GABBA";
  position:absolute;
  left:0;
}

h1::before{
  color:red;
  animation:glitch 0.3s infinite;
  opacity:0.5;
}

h1::after{
  color:blue;
  animation:glitch 0.2s infinite;
  opacity:0.5;
}

@keyframes glitch{
  0%{transform:translate(0);}
  25%{transform:translate(-2px,2px);}
  50%{transform:translate(2px,-2px);}
  75%{transform:translate(-1px,1px);}
  100%{transform:translate(0);}
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
  animation:glitch 0.2s infinite;
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
}

h2{
  margin-bottom:30px;
  letter-spacing:3px;
}

/* MERCH */
.merch{
  max-width:400px;
  margin:0 auto;
}

/* 💀 ФУТБОЛКА */
.merch img{
  width:100%;
  border:1px solid rgba(255,255,255,0.2);
  transition:0.4s;
}

.merch img:hover{
  transform:scale(1.05);
  filter:contrast(1.6) brightness(1.2);
  box-shadow:0 0 50px rgba(255,0,0,0.3);
  animation:glitch 0.2s infinite;
}

/* КНОПКА */
.merch-btn{
  display:block;
  margin-top:15px;
  padding:12px;
  border:1px solid #fff;
  text-decoration:none;
  color:#fff;
  transition:0.3s;
}

.merch-btn:hover{
  background:#fff;
  color:#000;
  animation:glitch 0.2s infinite;
}

/* SOCIAL */
.socials{
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials a{
  border:1px solid #fff;
  padding:10px 20px;
  text-decoration:none;
  color:#fff;
}

.socials a:hover{
  background:#fff;
  color:#000;
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  opacity:.5;
}
</style>
</head>

<body>

<section class="hero">
  <h1>PAPA GABBA</h1>

  <a href="https://open.spotify.com/track/7IzqmNEau3loDdGiLRpwcx" target="_blank" class="btn">
    LISTEN
  </a>
</section>

<section class="section">
  <h2>ABOUT</h2>
  <p style="opacity:.6;max-width:500px;margin:0 auto;">
    Raw energy. Dark aesthetics. Papa Gabba is a project built on underground sound and visual chaos.
  </p>
</section>

<section class="section">
  <h2>MERCH</h2>

  <div class="merch">
    <img src="https://i.imgur.com/CI0wmv2.jpeg">

    <p style="margin-top:10px;">PAPA GABBA T-SHIRT</p>
    <p style="opacity:.6;font-size:12px;">LIMITED DROP</p>

    <a href="https://t.me/nxmxmxlxkxx" target="_blank" class="merch-btn">
      BUY
    </a>
  </div>

</section>

<section class="section">
  <h2>FOLLOW</h2>

  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/track/7IzqmNEau3loDdGiLRpwcx" target="_blank">Spotify</a>
  </div>
</section>

<footer>
  © 2026 PAPA GABBA
</footer>

</body>
</html>
