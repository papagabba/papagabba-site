<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papa Gabba</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Orbitron', sans-serif;overflow:hidden}

/* INTRO */
#intro{position:fixed;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;z-index:9999;cursor:pointer}
#intro h1{font-size:2rem;letter-spacing:5px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

body.loaded{overflow:auto}

/* VIDEO BG */
video.bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  opacity:.25;
  z-index:-2;
}

.noise{position:fixed;width:100%;height:100%;background:url('https://grainy-gradients.vercel.app/noise.svg');opacity:.1;pointer-events:none}

.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}

h1{font-size:5rem;letter-spacing:12px;animation:glitch .8s infinite}
@keyframes glitch{0%{text-shadow:3px 0 red,-3px 0 blue}50%{text-shadow:-3px 0 red,3px 0 blue}100%{text-shadow:3px 0 red,-3px 0 blue}}

.btn{margin-top:30px;padding:15px 40px;border:1px solid #fff;text-decoration:none;color:#fff;transition:.3s}
.btn:hover{background:#fff;color:#000;transform:scale(1.1)}

.section{padding:120px 20px;text-align:center}
h2{margin-bottom:40px;font-size:1.5rem;letter-spacing:3px}

.player{display:flex;justify-content:center}
iframe{border-radius:12px}

/* MERCH ULTRA */
.merch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:30px;max-width:900px;margin:0 auto}

.merch-item{position:relative;border:1px solid rgba(255,255,255,0.2);padding:15px;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);transition:.4s;overflow:hidden}

.merch-item:hover{transform:translateY(-10px) scale(1.05);border-color:#fff;box-shadow:0 0 20px rgba(255,255,255,0.3)}

.merch-item img{width:100%;margin-bottom:10px;filter:grayscale(100%);transition:.4s}
.merch-item:hover img{filter:grayscale(0%)}

.badge{position:absolute;top:10px;left:10px;font-size:.7rem;border:1px solid #fff;padding:3px 6px;background:black}

.merch-btn{display:block;text-decoration:none;border:1px solid currentColor;padding:8px;transition:.3s}
.merch-btn:hover{background:#fff;color:#000}

/* AUDIO VISUALIZER */
.visualizer{
  width:200px;height:40px;margin:20px auto;display:flex;gap:4px;
}
.bar{
  width:5px;background:white;animation:beat 1s infinite ease-in-out
}
.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}
.bar:nth-child(5){animation-delay:.8s}

@keyframes beat{
  0%,100%{height:10px}
  50%{height:40px}
}

.socials{display:flex;justify-content:center;gap:20px;margin-top:20px}
.socials a{border:1px solid #fff;padding:10px 20px;text-decoration:none;color:#fff;transition:.3s}
.socials a:hover{background:#fff;color:#000}

footer{padding:40px;text-align:center;opacity:.5}
</style>
</head>

<body>

<div id="intro" onclick="startSite()">
  <h1>ENTER SYSTEM</h1>
</div>

<video class="bg" autoplay muted loop>
  <source src="https://cdn.pixabay.com/video/2023/06/18/167784-837438543_large.mp4" type="video/mp4">
</video>

<div class="noise"></div>

<section class="hero">
  <h1>PAPA GABBA</h1>
  <div class="visualizer">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
  </div>
  <a href="#music" class="btn">LISTEN</a>
</section>

<section id="music" class="section">
  <h2>LATEST RELEASE</h2>
  <div class="player">
    <iframe src="<iframe 
src="https://open.spotify.com/embed/track/7IzqmNEau3loDdGiLRpwcx?utm_source=generator"
width="300" 
height="152" 
style="border-radius:12px"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>" width="300" height="152"></iframe>
  </div>
</section>

<section class="section">
  <h2>MERCH</h2>
  <div class="merch-grid">

    <div class="merch-item">
      <div class="badge">NEW</div>
      <img src="https://via.placeholder.com/300x300">
      <p>PAPA GABBA T-Shirt</p>
      <a href="https://your-link.com" target="_blank" class="merch-btn">BUY</a>
    </div>

    <div class="merch-item">
      <div class="badge">LIMITED</div>
      <img src="https://via.placeholder.com/300x300">
      <p>PAPA GABBA HOODIE</p>
      <a href="https://your-link.com" target="_blank" class="merch-btn">BUY</a>
    </div>

  </div>
</section>

<section class="section">
  <h2>FOLLOW</h2>
  <div class="socials">
    <a href="https://instagram.com/papagabbaofficial" target="_blank">Instagram</a>
    <a href="https://open.spotify.com/artist/0wpnVBR3J3rYbiuyB7FId3?si=9doSUapERM6tEf5QLma9KA" target="_blank">Spotify</a>
  </div>
</section>

<footer>
  © 2026 Papa Gabba
</footer>

<script>
function startSite(){
  document.getElementById('intro').style.display='none';
  document.body.classList.add('loaded');
}
</script>

</body>
</html>
