<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA GABBA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  color:#fff;
  font-family:'Orbitron',sans-serif;
  overflow-x:hidden;
}

/* 🎥 VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.25;
  z-index:-2;
}

/* 📼 NOISE */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.08;
  pointer-events:none;
  z-index:999;
}

/* ⚡ FLASH */
#flash{
  position:fixed;
  width:100%;
  height:100%;
  background:white;
  opacity:0;
  z-index:9998;
}

/* 👁 FACE */
#face{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://i.imgur.com/8yKQFQX.png") center/contain no-repeat;
  opacity:0;
  z-index:9997;
}

/* INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  cursor:pointer;
}

#intro h1{
  font-size:2rem;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:0.2;}
  50%{opacity:1;}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* GLITCH TITLE */
h1{
  font-size:5rem;
  letter-spacing:10px;
  position:relative;
}

h1::before,
h1::after{
  content:"PAPA GABBA";
  position:absolute;
  left:0;
}

h1::before{
  color:red;
  animation:glitch 0.2s infinite;
}

h1::after{
  color:blue;
  animation:glitch 0.15s infinite;
}

@keyframes glitch{
  0%{transform:translate(0);}
  25%{transform:translate(-3px,3px);}
  50%{transform:translate(3px,-3px);}
  75%{transform:translate(-2px,2px);}
  100%{transform:translate(0);}
}

/* SCREEN GLITCH */
body.glitch{
  animation:screenGlitch 0.3s;
}

@keyframes screenGlitch{
  0%{transform:translate(0);}
  20%{transform:translate(-10px,5px);}
  40%{transform:translate(10px,-5px);}
  60%{transform:translate(-5px,3px);}
  80%{transform:translate(5px,-3px);}
  100%{transform:translate(0);}
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:15px 40px;
  border:1px solid #fff;
  color:#fff;
  text-decoration:none;
}

/* MERCH */
.merch img{
  width:100%;
  transition:0.4s;
}

.merch img:hover{
  transform:scale(1.05);
  filter:contrast(1.8);
  animation:glitch 0.2s infinite;
}

/* SECTIONS */
.section{
  padding:80px 20px;
  text-align:center;
}

footer{
  padding:40px;
  text-align:center;
}
</style>
</head>

<body>

<div id="flash"></div>
<div id="face"></div>

<video autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-dark-glitch-4589/1080p.mp4">
</video>

<div id="intro">
  <h1>ENTER SYSTEM</h1>
</div>

<audio id="boom">
  <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3">
</audio>

<section class="hero">
  <h1>PAPA GABBA</h1>
</section>

<script>
const intro = document.getElementById("intro");
const boom = document.getElementById("boom");
const flash = document.getElementById("flash");
const face = document.getElementById("face");

intro.onclick = () => {
  intro.style.display = "none";
  boom.play();

  // FLASH
  flash.style.opacity = 1;
  setTimeout(()=>flash.style.opacity=0,100);

  // FACE JUMPSCARE
  setTimeout(()=>{
    face.style.opacity = 1;
    setTimeout(()=>face.style.opacity=0,150);
  },150);

  // SCREEN GLITCH
  document.body.classList.add("glitch");
  setTimeout(()=>document.body.classList.remove("glitch"),300);
};
</script>

</body>
</html>
